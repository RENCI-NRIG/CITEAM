[supervisord]
nodaemon=true

[program:jupyter]
user=citeams
command=jupyter lab --notebook-dir=/home/citeams/ --port=8888 --no-browser --ip=0.0.0.0 --allow-root
autorestart=True
startsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
environment = HOME="/home/citeams",USER="citeams"


